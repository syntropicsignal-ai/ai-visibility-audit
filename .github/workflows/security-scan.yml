name: Image scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # upload SARIF to the Security tab

concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: docker/api.Dockerfile
          - component: web
            context: web
            dockerfile: docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.component }} for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.component }}:scan
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.component }}

      # Pinned to a commit SHA, not a tag: trivy-action's tags were
      # force-pushed to malware in the March 2026 supply-chain incident.
      - name: Report HIGH/CRITICAL to the Security tab
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.component }}:scan
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true # forks get a read-only token
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

      - name: Fail on fixable CRITICAL
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.component }}:scan
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
