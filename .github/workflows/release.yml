name: Release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds both images, pushes them to GHCR as :<version> and :latest,
# then publishes a GitHub Release with auto-generated notes.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: docker/api.Dockerfile
          - component: web
            context: web
            dockerfile: docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build + push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  release:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
