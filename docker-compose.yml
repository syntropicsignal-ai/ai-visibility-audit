# Pulls the published images — no build step.
#   docker compose up -d
# Then open http://localhost:8080. Add API keys in .env or via the setup UI.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_visibility_audit
      POSTGRES_USER: aiva
      POSTGRES_PASSWORD: aiva
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiva -d ai_visibility_audit"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/syntropicsignal-ai/ai-visibility-audit/api:latest
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aiva:aiva@db:5432/ai_visibility_audit
    volumes:
      - apidata:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/syntropicsignal-ai/ai-visibility-audit/web:latest
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  apidata:
