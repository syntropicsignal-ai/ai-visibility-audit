services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_visibility_audit
      POSTGRES_USER: aiva
      POSTGRES_PASSWORD: aiva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiva -d ai_visibility_audit"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: ../docker/api.Dockerfile
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - /app/.venv
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aiva:aiva@db:5432/ai_visibility_audit
      REPORT_RENDER_URL: http://web:5173
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: ../docker/web.Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY: http://api:8000

volumes:
  pgdata:
