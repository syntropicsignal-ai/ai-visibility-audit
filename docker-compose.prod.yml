# Production stack — pulls pre-built images from GHCR, no local build.
#   cp .env.example .env   # add your API keys
#   docker compose -f docker-compose.prod.yml up -d
# Then open http://localhost:8080.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_visibility_audit
      POSTGRES_USER: aiva
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiva}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiva -d ai_visibility_audit"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/syntropicsignal-ai/ai-visibility-audit/api:${VERSION:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aiva:${POSTGRES_PASSWORD:-aiva}@db:5432/ai_visibility_audit
    volumes:
      - apidata:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/syntropicsignal-ai/ai-visibility-audit/web:${VERSION:-latest}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
  apidata:
